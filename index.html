<!-- /index.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FSP PDF Arşivi</title>
  <meta name="description" content="FSP PDF arşivi" />
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --rowA: #ffffff;
      --rowB: #f9fafb;
      --hover: #eef2f7;
      --active: #111827;
      --activeText: #ffffff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
      word-break: break-word;
    }

    .folder-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .folder-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .folder-btn.active {
      background: var(--active);
      color: var(--activeText);
      border-color: var(--active);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search {
      flex: 1 1 320px;
      min-width: 220px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .search:focus {
      border-color: #cbd5e1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .action-btn:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .zip-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #111827;
      border-radius: 999px;
      animation: zip-spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes zip-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .list-head {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 72px 84px 92px;
      gap: 12px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .state {
      padding: 20px 22px;
      color: var(--muted);
    }

    .rows {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 72px 84px 92px;
      gap: 12px;
      align-items: center;
      padding: 14px 22px;
      border-top: 1px solid var(--line);
    }

    .row:nth-child(odd) {
      background: var(--rowA);
    }

    .row:nth-child(even) {
      background: var(--rowB);
    }

    .row:hover {
      background: var(--hover);
    }

    .index {
      font-size: 14px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .name-link {
      color: inherit;
      text-decoration: none;
      min-width: 0;
      display: block;
    }

    .name-link:hover .name {
      text-decoration: underline;
    }

    .name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pages,
    .size {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: #f8fafc;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 8px;
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      .header {
        padding: 18px;
      }

      .list-head,
      .row,
      .state {
        padding-left: 14px;
        padding-right: 14px;
      }

      .list-head,
      .row {
        grid-template-columns: 38px minmax(0, 1fr) 48px 62px 62px;
        gap: 8px;
      }

      .list-head {
        font-size: 12px;
      }

      .index,
      .pages,
      .size {
        font-size: 12px;
      }

      .name {
        font-size: 13px;
      }

      .download-btn {
        min-height: 30px;
        padding: 0 8px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel header">
      <h1 class="title">FSP PDF Arşivi</h1>
      <p id="subtitle" class="subtitle">Klasörler yükleniyor...</p>

      <div id="folderBar" class="folder-bar"></div>

      <div class="toolbar">
        <input id="searchInput" class="search" type="search" placeholder="PDF ara..." autocomplete="off" />
        <div id="countBadge" class="badge">Yükleniyor...</div>

        <button id="zipBtn" class="action-btn" type="button" disabled>
          <span id="zipSpinner" class="zip-spinner" hidden></span>
          <span id="zipBtnText">ZIP indir</span>
        </button>
      </div>

      <div class="note">Dosya adına tıklayınca PDF.js görüntüleyici açılır. Sağdaki butondan doğrudan indirebilirsiniz.</div>
    </section>

    <section class="panel">
      <div class="list-head">
        <div>No</div>
        <div>Dosya</div>
        <div>Sayfa</div>
        <div>Boyut</div>
        <div>İndir</div>
      </div>

      <div id="state" class="state">PDF listesi yükleniyor...</div>
      <div id="rows" class="rows" hidden></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs";

    const owner = "protokolFSP";
    const repo = "FSP-pdfs";
    const branch = "main";
    const rootDocsPath = "docs";

    const folderBarEl = document.getElementById("folderBar");
    const subtitleEl = document.getElementById("subtitle");
    const stateEl = document.getElementById("state");
    const rowsEl = document.getElementById("rows");
    const countBadgeEl = document.getElementById("countBadge");
    const searchInputEl = document.getElementById("searchInput");
    const zipBtnEl = document.getElementById("zipBtn");
    const zipBtnTextEl = document.getElementById("zipBtnText");
    const zipSpinnerEl = document.getElementById("zipSpinner");

    let topFolders = [];
    let allFiles = [];
    let visibleFiles = [];
    let currentFolderKey = "";
    let loadAbortController = null;
    const pageCountCache = new Map();
    const pageCountTaskCache = new Map();

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function formatName(filename) {
      return filename
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatSize(bytes) {
      if (!Number.isFinite(bytes)) return "";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unitIndex = 0;

      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }

      const precision = value >= 100 || unitIndex === 0 ? 0 : 1;
      return `${value.toFixed(precision)} ${units[unitIndex]}`;
    }

    function normalizeLabel(value) {
      return String(value).replace(/\s+/g, " ").trim();
    }

    function sortByName(list) {
      return [...list].sort((a, b) => a.name.localeCompare(b.name, "tr"));
    }

    function buildGithubContentsUrl(path) {
      const normalizedPath = path
        .split("/")
        .map(encodeURIComponent)
        .join("/")
        .replace(/%2F/g, "/");

      return `https://api.github.com/repos/${owner}/${repo}/contents/${normalizedPath}?ref=${encodeURIComponent(branch)}`;
    }

    async function fetchRepoContents(path, signal) {
      const response = await fetch(buildGithubContentsUrl(path), {
        signal,
        headers: { Accept: "application/vnd.github+json" }
      });

      if (response.status === 404) {
        return [];
      }

      if (!response.ok) {
        throw new Error(`GitHub API hatası: ${response.status}`);
      }

      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    function getRepoBasePath() {
      const firstSegment = window.location.pathname.split("/").filter(Boolean)[0];
      return firstSegment ? `/${firstSegment}` : "";
    }

    function getFolderPath(folderKey) {
      return `${rootDocsPath}/${folderKey}`;
    }

    function getPagesPdfUrl(fileName, folderKey = currentFolderKey) {
      const encodedFolderPath = getFolderPath(folderKey)
        .split("/")
        .map(encodeURIComponent)
        .join("/");

      return `${window.location.origin}${getRepoBasePath()}/${encodedFolderPath}/${encodeURIComponent(fileName)}`;
    }

    function buildViewerUrl(fileName) {
      const pdfUrl = getPagesPdfUrl(fileName, currentFolderKey);
      const params = new URLSearchParams();

      params.set("pdf", pdfUrl);
      params.set("name", fileName);
      params.set("folder", currentFolderKey);

      return `viewer.html?${params.toString()}`;
    }

    function getFolderFromUrl() {
      return new URLSearchParams(window.location.search).get("folder") || "";
    }

    function updateUrlState(push = false) {
      const url = new URL(window.location.href);

      if (currentFolderKey) {
        url.searchParams.set("folder", currentFolderKey);
      } else {
        url.searchParams.delete("folder");
      }

      if (push) {
        window.history.pushState({}, "", url);
      } else {
        window.history.replaceState({}, "", url);
      }
    }

    function setZipLoadingState(isLoading, text = "ZIP indir") {
      zipBtnEl.disabled = isLoading || !visibleFiles.length;
      zipSpinnerEl.hidden = !isLoading;
      zipBtnTextEl.textContent = text;
    }

    function getPageCountCacheKey(folderKey, fileName) {
      return `${folderKey}::${fileName}`;
    }

    function getStoredPageCount(cacheKey) {
      try {
        const value = sessionStorage.getItem(`pdf-pages:${cacheKey}`);
        if (!value) return null;
        const parsed = Number(value);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
      } catch {
        return null;
      }
    }

    function setStoredPageCount(cacheKey, value) {
      try {
        sessionStorage.setItem(`pdf-pages:${cacheKey}`, String(value));
      } catch {
      }
    }

    async function destroyPdfDocument(pdf) {
      if (!pdf || typeof pdf.destroy !== "function") return;
      try {
        await pdf.destroy();
      } catch {
      }
    }

    async function getPdfPageCount(fileName, folderKey = currentFolderKey) {
      const cacheKey = getPageCountCacheKey(folderKey, fileName);

      if (pageCountCache.has(cacheKey)) {
        return pageCountCache.get(cacheKey);
      }

      const stored = getStoredPageCount(cacheKey);
      if (stored) {
        pageCountCache.set(cacheKey, stored);
        return stored;
      }

      if (pageCountTaskCache.has(cacheKey)) {
        return pageCountTaskCache.get(cacheKey);
      }

      const taskPromise = (async () => {
        const pdfUrl = getPagesPdfUrl(fileName, folderKey);
        const loadingTask = pdfjsLib.getDocument({
          url: pdfUrl,
          withCredentials: false,
          useWorkerFetch: true,
          disableRange: false,
          disableStream: false,
          disableAutoFetch: false
        });

        let pdf = null;

        try {
          pdf = await loadingTask.promise;
          const count = pdf.numPages;
          pageCountCache.set(cacheKey, count);
          setStoredPageCount(cacheKey, count);
          return count;
        } finally {
          try {
            await loadingTask.destroy();
          } catch {
          }
          await destroyPdfDocument(pdf);
        }
      })();

      pageCountTaskCache.set(cacheKey, taskPromise);

      try {
        return await taskPromise;
      } finally {
        pageCountTaskCache.delete(cacheKey);
      }
    }

    async function fillPageCounts(files, folderKeyAtStart) {
      for (const file of files) {
        if (folderKeyAtStart !== currentFolderKey) {
          return;
        }

        const cacheKey = getPageCountCacheKey(folderKeyAtStart, file.name);
        let count = pageCountCache.get(cacheKey) || getStoredPageCount(cacheKey);

        if (!count) {
          try {
            count = await getPdfPageCount(file.name, folderKeyAtStart);
          } catch (error) {
            console.error(error);
            count = "—";
            pageCountCache.set(cacheKey, count);
          }
        }

        const selector = `[data-pages-folder="${CSS.escape(folderKeyAtStart)}"][data-pages-file="${CSS.escape(file.name)}"]`;
        const cell = rowsEl.querySelector(selector);

        if (cell) {
          cell.textContent = count === "—" ? "—" : String(count);
        }
      }
    }

    function renderFolders() {
      folderBarEl.innerHTML = "";

      for (const folder of topFolders) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "folder-btn";
        button.textContent = normalizeLabel(folder.name);
        button.classList.toggle("active", folder.name === currentFolderKey);

        button.addEventListener("click", async () => {
          if (folder.name === currentFolderKey) return;
          currentFolderKey = folder.name;
          searchInputEl.value = "";
          updateUrlState(true);
          renderFolders();
          await loadFiles();
        });

        folderBarEl.appendChild(button);
      }
    }

    function render(files) {
      rowsEl.innerHTML = "";
      visibleFiles = files;

      if (!files.length) {
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "Gösterilecek dosya yok.";
        countBadgeEl.textContent = "0 dosya";
        setZipLoadingState(false, "ZIP indir");
        return;
      }

      stateEl.hidden = true;
      rowsEl.hidden = false;
      countBadgeEl.textContent = `${files.length} dosya`;
      setZipLoadingState(false, "ZIP indir");

      const folderKeyAtRender = currentFolderKey;

      for (const [index, file] of files.entries()) {
        const row = document.createElement("div");
        row.className = "row";

        const viewerUrl = buildViewerUrl(file.name);
        const pdfUrl = getPagesPdfUrl(file.name, folderKeyAtRender);
        const cacheKey = getPageCountCacheKey(folderKeyAtRender, file.name);
        const cachedPageCount = pageCountCache.get(cacheKey) || getStoredPageCount(cacheKey);

        row.innerHTML = `
          <div class="index">${index + 1}</div>
          <a class="name-link" href="${escapeAttr(viewerUrl)}">
            <div class="name">${escapeHtml(formatName(file.name))}</div>
          </a>
          <div
            class="pages"
            data-pages-folder="${escapeAttr(folderKeyAtRender)}"
            data-pages-file="${escapeAttr(file.name)}"
          >${cachedPageCount || "…"}</div>
          <div class="size">${escapeHtml(formatSize(file.size))}</div>
          <a class="download-btn" href="${escapeAttr(pdfUrl)}" download="${escapeAttr(file.name)}">İndir</a>
        `;

        rowsEl.appendChild(row);
      }

      fillPageCounts(files, folderKeyAtRender);
    }

    function applyFilter() {
      const query = searchInputEl.value.trim().toLocaleLowerCase("tr");

      const filtered = allFiles.filter((file) => {
        const haystack = `${file.name} ${formatName(file.name)}`.toLocaleLowerCase("tr");
        return haystack.includes(query);
      });

      render(filtered);
    }

    function updateSubtitle() {
      if (!currentFolderKey) {
        subtitleEl.textContent = "Klasör bulunamadı.";
        return;
      }

      subtitleEl.innerHTML = `Aktif klasör: <code>${escapeHtml(getFolderPath(currentFolderKey))}</code>`;
    }

    function setLoadingState(message = "PDF listesi yükleniyor...") {
      rowsEl.hidden = true;
      stateEl.hidden = false;
      stateEl.textContent = message;
      countBadgeEl.textContent = "Yükleniyor...";
      zipBtnEl.disabled = true;
    }

    async function loadTopFolders() {
      const items = await fetchRepoContents(rootDocsPath);

      topFolders = sortByName(items.filter((item) => item.type === "dir"));

      if (!topFolders.length) {
        currentFolderKey = "";
        allFiles = [];
        visibleFiles = [];
        folderBarEl.innerHTML = "";
        subtitleEl.textContent = "Klasör bulunamadı.";
        render([]);
        return false;
      }

      const folderFromUrl = getFolderFromUrl();
      const folderExists = topFolders.some((item) => item.name === folderFromUrl);

      currentFolderKey = folderExists ? folderFromUrl : topFolders[0].name;
      renderFolders();
      updateUrlState(false);
      updateSubtitle();
      return true;
    }

    async function loadFiles() {
      if (!currentFolderKey) {
        render([]);
        return;
      }

      if (loadAbortController) {
        loadAbortController.abort();
      }

      loadAbortController = new AbortController();
      const { signal } = loadAbortController;

      setLoadingState("PDF listesi yükleniyor...");
      updateSubtitle();

      try {
        const items = await fetchRepoContents(getFolderPath(currentFolderKey), signal);

        allFiles = sortByName(
          items.filter((item) => item.type === "file" && /\.pdf$/i.test(item.name))
        );

        applyFilter();
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }

        allFiles = [];
        visibleFiles = [];
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "PDF listesi yüklenemedi.";
        countBadgeEl.textContent = "Hata";
        zipBtnEl.disabled = true;
        console.error(error);
      }
    }

    async function downloadCurrentFolderAsZip() {
      if (!visibleFiles.length) return;

      setZipLoadingState(true, `0 / ${visibleFiles.length}`);

      try {
        const zip = new JSZip();

        for (const [index, file] of visibleFiles.entries()) {
          setZipLoadingState(true, `${index + 1} / ${visibleFiles.length}`);

          const pdfUrl = getPagesPdfUrl(file.name, currentFolderKey);
          const response = await fetch(pdfUrl);

          if (!response.ok) {
            throw new Error(`${file.name} indirilemedi.`);
          }

          const blob = await response.blob();
          zip.file(file.name, blob);
        }

        setZipLoadingState(true, "ZIP oluşturuluyor...");

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const downloadUrl = URL.createObjectURL(zipBlob);
        const link = document.createElement("a");
        const safeFolderName = currentFolderKey.replace(/\s+/g, "_");

        link.href = downloadUrl;
        link.download = `${safeFolderName}.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => {
          URL.revokeObjectURL(downloadUrl);
        }, 1000);
      } catch (error) {
        console.error(error);
        alert("ZIP hazırlanırken hata oluştu.");
      } finally {
        setZipLoadingState(false, "ZIP indir");
      }
    }

    async function initialize() {
      setLoadingState("Klasörler yükleniyor...");

      try {
        const ok = await loadTopFolders();
        if (!ok) return;
        await loadFiles();
      } catch (error) {
        allFiles = [];
        visibleFiles = [];
        folderBarEl.innerHTML = "";
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "Klasörler yüklenemedi.";
        countBadgeEl.textContent = "Hata";
        zipBtnEl.disabled = true;
        console.error(error);
      }
    }

    window.addEventListener("popstate", async () => {
      const folderFromUrl = getFolderFromUrl();

      if (folderFromUrl && topFolders.some((item) => item.name === folderFromUrl)) {
        currentFolderKey = folderFromUrl;
      } else if (topFolders.length) {
        currentFolderKey = topFolders[0].name;
      } else {
        currentFolderKey = "";
      }

      searchInputEl.value = "";
      renderFolders();
      await loadFiles();
    });

    zipBtnEl.addEventListener("click", downloadCurrentFolderAsZip);
    searchInputEl.addEventListener("input", applyFilter);

    initialize();
  </script>
</body>
</html>
