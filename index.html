<!-- /index.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FSP PDF Arşivi</title>
  <meta name="description" content="FSP PDF arşivi" />
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --rowA: #ffffff;
      --rowB: #f9fafb;
      --hover: #eef2f7;
      --active: #111827;
      --activeText: #ffffff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .folder-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .folder-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .folder-btn.active {
      background: var(--active);
      color: var(--activeText);
      border-color: var(--active);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search {
      flex: 1 1 320px;
      min-width: 220px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .badge,
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      text-decoration: none;
    }

    .action-btn {
      color: var(--text);
      cursor: pointer;
    }

    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .list-head {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .state {
      padding: 20px 22px;
      color: var(--muted);
    }

    .rows {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 22px;
      border-top: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
    }

    .row:nth-child(odd) {
      background: var(--rowA);
    }

    .row:nth-child(even) {
      background: var(--rowB);
    }

    .row:hover {
      background: var(--hover);
    }

    .index {
      font-size: 14px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .size {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .header {
        padding: 18px;
      }

      .list-head,
      .row,
      .state {
        padding-left: 16px;
        padding-right: 16px;
      }

      .list-head,
      .row {
        grid-template-columns: 56px 1fr;
      }

      .size {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel header">
      <h1 class="title">FSP PDF Arşivi</h1>
      <p id="subtitle" class="subtitle">Klasör yükleniyor...</p>

      <div id="folderBar" class="folder-bar"></div>

      <div class="toolbar">
        <input id="searchInput" class="search" type="search" placeholder="PDF ara..." autocomplete="off" />
        <div id="countBadge" class="badge">Yükleniyor...</div>
        <button id="zipBtn" class="action-btn" type="button">ZIPle</button>
      </div>

      <div class="note">Satıra tıklayınca PDF görüntüleyici açılır.</div>
    </section>

    <section class="panel">
      <div class="list-head">
        <div>No</div>
        <div>Dosya</div>
        <div>Boyut</div>
      </div>

      <div id="state" class="state">PDF listesi yükleniyor...</div>
      <div id="rows" class="rows" hidden></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const owner = "protokolFSP";
    const repo = "FSP-pdfs";
    const branch = "main";

    const folders = [
      { key: "düsseldorf", label: "Düsseldorf" },
      { key: "stuttgart", label: "Stuttgart" },
      { key: "hessen", label: "Hessen" },
      { key: "bayern", label: "Bayern" }
    ];

    const defaultFolderKey = "düsseldorf";

    const folderBarEl = document.getElementById("folderBar");
    const subtitleEl = document.getElementById("subtitle");
    const stateEl = document.getElementById("state");
    const rowsEl = document.getElementById("rows");
    const countBadgeEl = document.getElementById("countBadge");
    const searchInputEl = document.getElementById("searchInput");
    const zipBtnEl = document.getElementById("zipBtn");

    let allFiles = [];

    function getFolderFromUrl() {
      const folder = new URLSearchParams(window.location.search).get("folder");
      return folders.some((item) => item.key === folder) ? folder : defaultFolderKey;
    }

    let currentFolderKey = getFolderFromUrl();

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatName(filename) {
      return filename
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatSize(bytes) {
      if (!Number.isFinite(bytes)) return "";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unitIndex = 0;

      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }

      const precision = value >= 100 || unitIndex === 0 ? 0 : 1;
      return `${value.toFixed(precision)} ${units[unitIndex]}`;
    }

    function getFolderPath(folderKey) {
      return `docs/${folderKey}`;
    }

    function updateUrlFolder(folderKey) {
      const url = new URL(window.location.href);
      url.searchParams.set("folder", folderKey);
      window.history.replaceState({}, "", url);
    }

    function getPagesPdfUrl(fileName) {
      const encodedFolderPath = getFolderPath(currentFolderKey)
        .split("/")
        .map(encodeURIComponent)
        .join("/");
      return `${window.location.origin}/${repo}/${encodedFolderPath}/${encodeURIComponent(fileName)}`;
    }

    function buildViewerUrl(fileName) {
      const pdfUrl = getPagesPdfUrl(fileName);
      return `viewer.html?pdf=${encodeURIComponent(pdfUrl)}&name=${encodeURIComponent(fileName)}&folder=${encodeURIComponent(currentFolderKey)}`;
    }

    function getCurrentFolderLabel() {
      return folders.find((item) => item.key === currentFolderKey)?.label || currentFolderKey;
    }

    function renderFolderButtons() {
      folderBarEl.innerHTML = "";

      for (const folder of folders) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "folder-btn";
        button.textContent = folder.label;
        button.classList.toggle("active", folder.key === currentFolderKey);
        button.addEventListener("click", () => {
          if (folder.key === currentFolderKey) return;
          currentFolderKey = folder.key;
          updateUrlFolder(currentFolderKey);
          searchInputEl.value = "";
          renderFolderButtons();
          loadFiles();
        });
        folderBarEl.appendChild(button);
      }
    }

    function render(files) {
      rowsEl.innerHTML = "";

      if (!files.length) {
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "Gösterilecek dosya yok.";
        countBadgeEl.textContent = "0 dosya";
        zipBtnEl.disabled = true;
        return;
      }

      stateEl.hidden = true;
      rowsEl.hidden = false;
      countBadgeEl.textContent = `${files.length} dosya`;
      zipBtnEl.disabled = false;

      for (const [index, file] of files.entries()) {
        const link = document.createElement("a");
        link.className = "row";
        link.href = buildViewerUrl(file.name);

        link.innerHTML = `
          <div class="index">${index + 1}</div>
          <div class="name">${escapeHtml(formatName(file.name))}</div>
          <div class="size">${escapeHtml(formatSize(file.size))}</div>
        `;

        rowsEl.appendChild(link);
      }
    }

    function applyFilter() {
      const query = searchInputEl.value.trim().toLocaleLowerCase("tr");
      const filtered = allFiles.filter((file) => {
        const haystack = `${file.name} ${formatName(file.name)}`.toLocaleLowerCase("tr");
        return haystack.includes(query);
      });
      render(filtered);
    }

    async function loadFiles() {
      const folderPath = getFolderPath(currentFolderKey);
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(folderPath).replace(/%2F/g, "/")}?ref=${encodeURIComponent(branch)}`;

      subtitleEl.innerHTML = `Varsayılan klasör: <code>${escapeHtml(getFolderPath(defaultFolderKey))}</code> · Aktif klasör: <code>${escapeHtml(folderPath)}</code>`;
      rowsEl.hidden = true;
      stateEl.hidden = false;
      stateEl.textContent = "PDF listesi yükleniyor...";
      countBadgeEl.textContent = "Yükleniyor...";
      zipBtnEl.disabled = true;

      try {
        const response = await fetch(apiUrl, {
          headers: { Accept: "application/vnd.github+json" }
        });

        if (response.status === 404) {
          allFiles = [];
          render([]);
          return;
        }

        if (!response.ok) {
          throw new Error(`GitHub API hatası: ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          allFiles = [];
          render([]);
          return;
        }

        allFiles = data
          .filter((item) => item.type === "file" && /\.pdf$/i.test(item.name))
          .sort((a, b) => a.name.localeCompare(b.name, "tr"));

        applyFilter();
      } catch (error) {
        allFiles = [];
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "PDF listesi yüklenemedi.";
        countBadgeEl.textContent = "Hata";
        zipBtnEl.disabled = true;
        console.error(error);
      }
    }

    async function downloadCurrentFolderAsZip() {
      if (!allFiles.length) return;

      zipBtnEl.disabled = true;
      zipBtnEl.textContent = "ZIP hazırlanıyor...";

      try {
        const zip = new JSZip();

        for (const file of allFiles) {
          const pdfUrl = getPagesPdfUrl(file.name);
          const response = await fetch(pdfUrl);

          if (!response.ok) {
            throw new Error(`${file.name} indirilemedi.`);
          }

          const blob = await response.blob();
          zip.file(file.name, blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const downloadUrl = URL.createObjectURL(zipBlob);
        const link = document.createElement("a");
        const folderLabel = getCurrentFolderLabel().replace(/\s+/g, "_");

        link.href = downloadUrl;
        link.download = `${folderLabel}.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(downloadUrl);
      } catch (error) {
        console.error(error);
        alert("ZIP hazırlanırken hata oluştu.");
      } finally {
        zipBtnEl.disabled = !allFiles.length;
        zipBtnEl.textContent = "ZIP indir";
      }
    }

    window.addEventListener("popstate", () => {
      currentFolderKey = getFolderFromUrl();
      searchInputEl.value = "";
      renderFolderButtons();
      loadFiles();
    });

    zipBtnEl.addEventListener("click", downloadCurrentFolderAsZip);

    updateUrlFolder(currentFolderKey);
    renderFolderButtons();
    loadFiles();
    searchInputEl.addEventListener("input", applyFilter);
  </script>
</body>
</html>
