<!-- /index.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FSP PDF Arşivi</title>
  <meta name="description" content="FSP PDF arşivi" />
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --rowA: #ffffff;
      --rowB: #f9fafb;
      --hover: #eef2f7;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search {
      flex: 1 1 320px;
      min-width: 220px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .list-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
    }

    .list-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .state {
      padding: 20px 22px;
      color: var(--muted);
    }

    .rows {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 22px;
      border-top: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
    }

    .row:nth-child(odd) {
      background: var(--rowA);
    }

    .row:nth-child(even) {
      background: var(--rowB);
    }

    .row:hover {
      background: var(--hover);
    }

    .name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .size {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .header {
        padding: 18px;
      }

      .list-head,
      .row,
      .state {
        padding-left: 16px;
        padding-right: 16px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel header">
      <h1 class="title">FSP PDF Arşivi</h1>
      <p class="subtitle">Varsayılan klasör: <code>docs/düsseldorf/</code></p>

      <div class="toolbar">
        <input id="searchInput" class="search" type="search" placeholder="PDF ara..." autocomplete="off" />
        <div id="countBadge" class="badge">Yükleniyor...</div>
      </div>

      <div class="note">
        Satıra tıklayınca PDF görüntüleyici açılır.
      </div>
    </section>

    <section class="panel">
      <div class="list-head">
        <h2>Dosyalar</h2>
      </div>

      <div id="state" class="state">PDF listesi yükleniyor...</div>
      <div id="rows" class="rows" hidden></div>
    </section>
  </main>

  <script>
    const owner = "protokolFSP";
    const repo = "FSP-pdfs";
    const branch = "main";
    const folderPath = "docs/düsseldorf";

    const stateEl = document.getElementById("state");
    const rowsEl = document.getElementById("rows");
    const countBadgeEl = document.getElementById("countBadge");
    const searchInputEl = document.getElementById("searchInput");

    let allFiles = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatName(filename) {
      return filename
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatSize(bytes) {
      if (!Number.isFinite(bytes)) return "";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unitIndex = 0;

      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }

      const precision = value >= 100 || unitIndex === 0 ? 0 : 1;
      return `${value.toFixed(precision)} ${units[unitIndex]}`;
    }

    function buildViewerUrl(fileName) {
      const encodedPath = `${folderPath}/${fileName}`;
      return `viewer.html?file=${encodeURIComponent(encodedPath)}`;
    }

    function render(files) {
      rowsEl.innerHTML = "";

      if (!files.length) {
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "Gösterilecek PDF bulunamadı.";
        countBadgeEl.textContent = "0 dosya";
        return;
      }

      stateEl.hidden = true;
      rowsEl.hidden = false;
      countBadgeEl.textContent = `${files.length} dosya`;

      for (const file of files) {
        const link = document.createElement("a");
        link.className = "row";
        link.href = buildViewerUrl(file.name);

        link.innerHTML = `
          <div class="name">${escapeHtml(formatName(file.name))}</div>
          <div class="size">${escapeHtml(formatSize(file.size))}</div>
        `;

        rowsEl.appendChild(link);
      }
    }

    function applyFilter() {
      const query = searchInputEl.value.trim().toLocaleLowerCase("tr");
      const filtered = allFiles.filter((file) => {
        const haystack = `${file.name} ${formatName(file.name)}`.toLocaleLowerCase("tr");
        return haystack.includes(query);
      });
      render(filtered);
    }

    async function loadFiles() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(folderPath).replace(/%2F/g, "/")}?ref=${encodeURIComponent(branch)}`;

      try {
        const response = await fetch(apiUrl, {
          headers: {
            Accept: "application/vnd.github+json"
          }
        });

        if (!response.ok) {
          throw new Error(`GitHub API hatası: ${response.status}`);
        }

        const data = await response.json();

        allFiles = data
          .filter((item) => item.type === "file" && /\.pdf$/i.test(item.name))
          .sort((a, b) => a.name.localeCompare(b.name, "tr"));

        render(allFiles);
      } catch (error) {
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "PDF listesi yüklenemedi.";
        countBadgeEl.textContent = "Hata";
        console.error(error);
      }
    }

    searchInputEl.addEventListener("input", applyFilter);
    loadFiles();
  </script>
</body>
</html>
