<!-- /index.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FSP PDF Arşivi</title>
  <meta name="description" content="FSP PDF arşivi" />
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --rowA: #ffffff;
      --rowB: #f9fafb;
      --hover: #eef2f7;
      --active: #111827;
      --activeText: #ffffff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .folder-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .folder-bar[hidden] {
      display: none;
    }

    .folder-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .folder-btn.active {
      background: var(--active);
      color: var(--activeText);
      border-color: var(--active);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .search {
      flex: 1 1 320px;
      min-width: 220px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .search:focus {
      border-color: #cbd5e1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .action-btn:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .zip-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #111827;
      border-radius: 999px;
      animation: zip-spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes zip-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .list-head {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .state {
      padding: 20px 22px;
      color: var(--muted);
    }

    .rows {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 22px;
      border-top: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
    }

    .row:nth-child(odd) {
      background: var(--rowA);
    }

    .row:nth-child(even) {
      background: var(--rowB);
    }

    .row:hover {
      background: var(--hover);
    }

    .index {
      font-size: 14px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .size {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 8px;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .header {
        padding: 18px;
      }

      .list-head,
      .row,
      .state {
        padding-left: 16px;
        padding-right: 16px;
      }

      .list-head,
      .row {
        grid-template-columns: 56px 1fr;
      }

      .size {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel header">
      <h1 class="title">FSP PDF Arşivi</h1>
      <p id="subtitle" class="subtitle">Klasörler yükleniyor...</p>

      <div id="folderBar" class="folder-bar"></div>
      <div id="subfolderBar" class="folder-bar" hidden></div>

      <div class="toolbar">
        <input id="searchInput" class="search" type="search" placeholder="PDF ara..." autocomplete="off" />
        <div id="countBadge" class="badge">Yükleniyor...</div>

        <button id="zipBtn" class="action-btn" type="button" disabled>
          <span id="zipSpinner" class="zip-spinner" hidden></span>
          <span id="zipBtnText">ZIP indir</span>
        </button>
      </div>

      <div class="note">Satıra tıklayınca görüntüleyici açılır.</div>
    </section>

    <section class="panel">
      <div class="list-head">
        <div>No</div>
        <div>Dosya</div>
        <div>Boyut</div>
      </div>

      <div id="state" class="state">PDF listesi yükleniyor...</div>
      <div id="rows" class="rows" hidden></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const owner = "protokolFSP";
    const repo = "FSP-pdfs";
    const branch = "main";
    const rootDocsPath = "docs";

    const folderBarEl = document.getElementById("folderBar");
    const subfolderBarEl = document.getElementById("subfolderBar");
    const subtitleEl = document.getElementById("subtitle");
    const stateEl = document.getElementById("state");
    const rowsEl = document.getElementById("rows");
    const countBadgeEl = document.getElementById("countBadge");
    const searchInputEl = document.getElementById("searchInput");
    const zipBtnEl = document.getElementById("zipBtn");
    const zipBtnTextEl = document.getElementById("zipBtnText");
    const zipSpinnerEl = document.getElementById("zipSpinner");

    let topFolders = [];
    let subfolders = [];
    let allFiles = [];
    let visibleFiles = [];
    let currentFolderKey = "";
    let currentSubfolderKey = "";

    let loadAbortController = null;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatName(filename) {
      return filename
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatSize(bytes) {
      if (!Number.isFinite(bytes)) return "";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unitIndex = 0;

      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }

      const precision = value >= 100 || unitIndex === 0 ? 0 : 1;
      return `${value.toFixed(precision)} ${units[unitIndex]}`;
    }

    function normalizeLabel(value) {
      return String(value).replace(/\s+/g, " ").trim();
    }

    function sortByName(list) {
      return [...list].sort((a, b) => a.name.localeCompare(b.name, "tr"));
    }

    function buildGithubContentsUrl(path) {
      const normalizedPath = path
        .split("/")
        .map(encodeURIComponent)
        .join("/")
        .replace(/%2F/g, "/");

      return `https://api.github.com/repos/${owner}/${repo}/contents/${normalizedPath}?ref=${encodeURIComponent(branch)}`;
    }

    async function fetchRepoContents(path, signal) {
      const response = await fetch(buildGithubContentsUrl(path), {
        signal,
        headers: { Accept: "application/vnd.github+json" }
      });

      if (response.status === 404) {
        return [];
      }

      if (!response.ok) {
        throw new Error(`GitHub API hatası: ${response.status}`);
      }

      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    function getRepoBasePath() {
      const firstSegment = window.location.pathname.split("/").filter(Boolean)[0];
      return firstSegment ? `/${firstSegment}` : "";
    }

    function getActiveRelativePath() {
      const segments = [rootDocsPath, currentFolderKey];
      if (currentSubfolderKey) {
        segments.push(currentSubfolderKey);
      }
      return segments.join("/");
    }

    function getPagesPdfUrl(fileName) {
      const encodedFolderPath = getActiveRelativePath()
        .split("/")
        .map(encodeURIComponent)
        .join("/");

      return `${window.location.origin}${getRepoBasePath()}/${encodedFolderPath}/${encodeURIComponent(fileName)}`;
    }

    function buildViewerUrl(fileName) {
      const pdfUrl = getPagesPdfUrl(fileName);
      const url = new URL("viewer.html", window.location.href);

      url.searchParams.set("pdf", pdfUrl);
      url.searchParams.set("name", fileName);
      url.searchParams.set("folder", currentFolderKey);

      if (currentSubfolderKey) {
        url.searchParams.set("subfolder", currentSubfolderKey);
      }

      return `${url.pathname}${url.search}`;
    }

    function getFolderFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return {
        folder: params.get("folder") || "",
        subfolder: params.get("subfolder") || ""
      };
    }

    function updateUrlState(push = false) {
      const url = new URL(window.location.href);
      url.searchParams.set("folder", currentFolderKey);

      if (currentSubfolderKey) {
        url.searchParams.set("subfolder", currentSubfolderKey);
      } else {
        url.searchParams.delete("subfolder");
      }

      if (push) {
        window.history.pushState({}, "", url);
      } else {
        window.history.replaceState({}, "", url);
      }
    }

    function setZipLoadingState(isLoading, text = "ZIP indir") {
      zipBtnEl.disabled = isLoading || !visibleFiles.length;
      zipSpinnerEl.hidden = !isLoading;
      zipBtnTextEl.textContent = text;
    }

    function renderTopFolders() {
      folderBarEl.innerHTML = "";

      for (const folder of topFolders) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "folder-btn";
        button.textContent = normalizeLabel(folder.name);
        button.classList.toggle("active", folder.name === currentFolderKey);

        button.addEventListener("click", async () => {
          if (folder.name === currentFolderKey) return;
          currentFolderKey = folder.name;
          currentSubfolderKey = "";
          searchInputEl.value = "";
          updateUrlState(true);
          renderTopFolders();
          renderSubfolders();
          await loadActiveLevel();
        });

        folderBarEl.appendChild(button);
      }
    }

    function renderSubfolders() {
      subfolderBarEl.innerHTML = "";

      if (!subfolders.length) {
        subfolderBarEl.hidden = true;
        return;
      }

      subfolderBarEl.hidden = false;

      for (const folder of subfolders) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "folder-btn";
        button.textContent = normalizeLabel(folder.name);
        button.classList.toggle("active", folder.name === currentSubfolderKey);

        button.addEventListener("click", async () => {
          if (folder.name === currentSubfolderKey) return;
          currentSubfolderKey = folder.name;
          searchInputEl.value = "";
          updateUrlState(true);
          renderSubfolders();
          await loadFilesForCurrentPath();
        });

        subfolderBarEl.appendChild(button);
      }
    }

    function render(files) {
      rowsEl.innerHTML = "";
      visibleFiles = files;

      if (!files.length) {
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "Gösterilecek dosya yok.";
        countBadgeEl.textContent = "0 dosya";
        setZipLoadingState(false, "ZIP indir");
        return;
      }

      stateEl.hidden = true;
      rowsEl.hidden = false;
      countBadgeEl.textContent = `${files.length} dosya`;
      setZipLoadingState(false, "ZIP indir");

      for (const [index, file] of files.entries()) {
        const link = document.createElement("a");
        link.className = "row";
        link.href = buildViewerUrl(file.name);

        link.innerHTML = `
          <div class="index">${index + 1}</div>
          <div class="name">${escapeHtml(formatName(file.name))}</div>
          <div class="size">${escapeHtml(formatSize(file.size))}</div>
        `;

        rowsEl.appendChild(link);
      }
    }

    function applyFilter() {
      const query = searchInputEl.value.trim().toLocaleLowerCase("tr");

      const filtered = allFiles.filter((file) => {
        const haystack = `${file.name} ${formatName(file.name)}`.toLocaleLowerCase("tr");
        return haystack.includes(query);
      });

      render(filtered);
    }

    function updateSubtitle() {
      const parts = [`<code>${escapeHtml(`${rootDocsPath}/${currentFolderKey}`)}</code>`];

      if (currentSubfolderKey) {
        parts.push(`<code>${escapeHtml(`${rootDocsPath}/${currentFolderKey}/${currentSubfolderKey}`)}</code>`);
      }

      subtitleEl.innerHTML = `Aktif yol: ${parts.join(" · ")}`;
    }

    function setLoadingState(message = "PDF listesi yükleniyor...") {
      rowsEl.hidden = true;
      stateEl.hidden = false;
      stateEl.textContent = message;
      countBadgeEl.textContent = "Yükleniyor...";
      zipBtnEl.disabled = true;
    }

    async function loadTopFolders() {
      const controller = new AbortController();
      const items = await fetchRepoContents(rootDocsPath, controller.signal);

      topFolders = sortByName(items.filter((item) => item.type === "dir"));

      if (!topFolders.length) {
        currentFolderKey = "";
        currentSubfolderKey = "";
        allFiles = [];
        visibleFiles = [];
        folderBarEl.innerHTML = "";
        subfolderBarEl.innerHTML = "";
        subfolderBarEl.hidden = true;
        subtitleEl.textContent = "Klasör bulunamadı.";
        render([]);
        return false;
      }

      const { folder, subfolder } = getFolderFromUrl();
      const folderExists = topFolders.some((item) => item.name === folder);

      currentFolderKey = folderExists ? folder : topFolders[0].name;
      currentSubfolderKey = subfolder || "";

      renderTopFolders();
      updateUrlState(false);
      return true;
    }

    async function loadActiveLevel() {
      if (!currentFolderKey) {
        render([]);
        return;
      }

      if (loadAbortController) {
        loadAbortController.abort();
      }

      loadAbortController = new AbortController();
      const { signal } = loadAbortController;

      setLoadingState("Klasör içeriği yükleniyor...");
      updateSubtitle();

      try {
        const activeItems = await fetchRepoContents(`${rootDocsPath}/${currentFolderKey}`, signal);

        subfolders = sortByName(activeItems.filter((item) => item.type === "dir"));
        renderSubfolders();

        if (!subfolders.length) {
          currentSubfolderKey = "";
          updateUrlState(false);
        } else {
          const hasSelectedSubfolder = subfolders.some((item) => item.name === currentSubfolderKey);
          currentSubfolderKey = hasSelectedSubfolder ? currentSubfolderKey : subfolders[0].name;
          renderSubfolders();
          updateUrlState(false);
        }

        await loadFilesForCurrentPath(signal, activeItems);
      } catch (error) {
        if (error.name === "AbortError") return;

        allFiles = [];
        visibleFiles = [];
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "Klasör içeriği yüklenemedi.";
        countBadgeEl.textContent = "Hata";
        zipBtnEl.disabled = true;
        console.error(error);
      }
    }

    async function loadFilesForCurrentPath(signalFromParent = null, parentItems = null) {
      const signal = signalFromParent || loadAbortController?.signal;

      try {
        updateSubtitle();

        let items = [];

        if (currentSubfolderKey) {
          setLoadingState("Alt klasör PDF listesi yükleniyor...");
          items = await fetchRepoContents(`${rootDocsPath}/${currentFolderKey}/${currentSubfolderKey}`, signal);
        } else if (Array.isArray(parentItems)) {
          setLoadingState("PDF listesi yükleniyor...");
          items = parentItems;
        } else {
          setLoadingState("PDF listesi yükleniyor...");
          items = await fetchRepoContents(`${rootDocsPath}/${currentFolderKey}`, signal);
        }

        allFiles = sortByName(
          items.filter((item) => item.type === "file" && /\.pdf$/i.test(item.name))
        );

        applyFilter();
      } catch (error) {
        if (error.name === "AbortError") return;

        allFiles = [];
        visibleFiles = [];
        rowsEl.hidden = true;
        stateEl.hidden = false;
        stateEl.textContent = "PDF listesi yüklenemedi.";
        countBadgeEl.textContent = "Hata";
        zipBtnEl.disabled = true;
        console.error(error);
      }
    }

    async function downloadCurrentFolderAsZip() {
      if (!visibleFiles.length) return;

      setZipLoadingState(true, `0 / ${visibleFiles.length}`);

      try {
        const zip = new JSZip();

        for (const [index, file] of visibleFiles.entries()) {
          setZipLoadingState(true, `${index + 1} / ${visibleFiles.length}`);

          const pdfUrl = getPagesPdfUrl(file.name);
          const response = await fetch(pdfUrl);

          if (!response.ok) {
            throw new Error(`${file.name} indirilemedi.`);
          }

          const blob = await response.blob();
          zip.file(file.name, blob);
        }

        setZipLoadingState(true, "ZIP oluşturuluyor...");

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const downloadUrl = URL.createObjectURL(zipBlob);
        const link = document.createElement("a");
        const nameParts = [currentFolderKey];

        if (currentSubfolderKey) {
          nameParts.push(currentSubfolderKey);
        }

        link.href = downloadUrl;
        link.download = `${nameParts.join("_").replace(/\s+/g, "_")}.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => {
          URL.revokeObjectURL(downloadUrl);
        }, 1000);
      } catch (error) {
        console.error(error);
        alert("ZIP hazırlanırken hata oluştu.");
      } finally {
        setZipLoadingState(false, "ZIP indir");
      }
    }

    async function initialize() {
      setLoadingState("Klasörler yükleniyor...");

      const ok = await loadTopFolders();
      if (!ok) return;

      await loadActiveLevel();
    }

    window.addEventListener("popstate", async () => {
      const { folder, subfolder } = getFolderFromUrl();

      if (folder) {
        currentFolderKey = folder;
      }

      currentSubfolderKey = subfolder || "";
      searchInputEl.value = "";
      renderTopFolders();
      await loadActiveLevel();
    });

    zipBtnEl.addEventListener("click", downloadCurrentFolderAsZip);
    searchInputEl.addEventListener("input", applyFilter);

    initialize();
  </script>
</body>
</html>
