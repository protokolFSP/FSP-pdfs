<!-- /viewer.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Görüntüleyici</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 16px 18px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 120px);
      border: 0;
      display: block;
      background: #eef2f7;
    }

    .error {
      padding: 24px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <section class="topbar">
    <h1 id="title" class="title">PDF yükleniyor...</h1>
    <div class="actions">
      <a id="backBtn" class="btn" href="./?folder=d%C3%BCsseldorf">Listeye dön</a>
    </div>
  </section>

  <section class="viewer">
    <iframe id="pdfViewer" title="PDF Görüntüleyici"></iframe>
    <div id="errorBox" class="error" hidden>PDF yolu bulunamadı.</div>
  </section>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatTitle(fileName) {
      return (fileName || "PDF")
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    const pdf = getParam("pdf");
    const name = getParam("name");
    const folder = getParam("folder") || "düsseldorf";

    const titleEl = document.getElementById("title");
    const backBtn = document.getElementById("backBtn");
    const pdfViewer = document.getElementById("pdfViewer");
    const errorBox = document.getElementById("errorBox");

    backBtn.href = `./?folder=${encodeURIComponent(folder)}`;

    if (!pdf) {
      titleEl.textContent = "PDF yolu bulunamadı.";
      pdfViewer.hidden = true;
      errorBox.hidden = false;
    } else {
      titleEl.textContent = formatTitle(name);
      pdfViewer.src = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdf)}`;
    }
  </script>
</body>
</html>
