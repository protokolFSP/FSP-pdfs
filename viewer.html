<!-- /viewer.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Görüntüleyici</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 16px 18px;
    }

    .title-wrap {
      min-width: 0;
      flex: 1 1 360px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
      word-break: break-word;
    }

    .meta {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:disabled,
    .btn[aria-disabled="true"] {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 140px);
      border: 0;
      display: block;
      background: #eef2f7;
    }

    .error {
      padding: 24px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <section class="topbar">
    <div class="title-wrap">
      <h1 id="title" class="title">PDF yükleniyor...</h1>
      <div id="meta" class="meta">Dosya bilgisi yükleniyor...</div>
    </div>

    <div class="actions">
      <a id="backBtn" class="btn" href="./?folder=d%C3%BCsseldorf">Listeye dön</a>
      <a id="prevBtn" class="btn" href="#" aria-disabled="true">Önceki</a>
      <a id="nextBtn" class="btn" href="#" aria-disabled="true">Sonraki</a>
    </div>
  </section>

  <section class="viewer">
    <iframe id="pdfViewer" title="PDF Görüntüleyici"></iframe>
    <div id="errorBox" class="error" hidden>PDF yolu bulunamadı.</div>
  </section>

  <script>
    const owner = "protokolFSP";
    const repo = "FSP-pdfs";
    const branch = "main";

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatTitle(fileName) {
      return (fileName || "PDF")
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getRepoBasePath() {
      const firstSegment = window.location.pathname.split("/").filter(Boolean)[0];
      return firstSegment ? `/${firstSegment}` : "";
    }

    function getFolderPath(folderKey) {
      return `docs/${folderKey}`;
    }

    function getPagesPdfUrl(folderKey, fileName) {
      const encodedFolderPath = getFolderPath(folderKey)
        .split("/")
        .map(encodeURIComponent)
        .join("/");
      return `${window.location.origin}${getRepoBasePath()}/${encodedFolderPath}/${encodeURIComponent(fileName)}`;
    }

    function buildViewerUrl(folderKey, fileName) {
      const pdfUrl = getPagesPdfUrl(folderKey, fileName);
      return `viewer.html?pdf=${encodeURIComponent(pdfUrl)}&name=${encodeURIComponent(fileName)}&folder=${encodeURIComponent(folderKey)}`;
    }

    function setNavState(element, enabled, href = "#") {
      element.href = href;
      element.setAttribute("aria-disabled", enabled ? "false" : "true");
    }

    async function loadFolderFiles(folderKey) {
      const folderPath = getFolderPath(folderKey);
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(folderPath).replace(/%2F/g, "/")}?ref=${encodeURIComponent(branch)}`;

      const response = await fetch(apiUrl, {
        headers: { Accept: "application/vnd.github+json" }
      });

      if (!response.ok) {
        throw new Error(`GitHub API hatası: ${response.status}`);
      }

      const data = await response.json();
      if (!Array.isArray(data)) return [];

      return data
        .filter((item) => item.type === "file" && /\.pdf$/i.test(item.name))
        .sort((a, b) => a.name.localeCompare(b.name, "tr"));
    }

    const pdf = getParam("pdf");
    const name = getParam("name");
    const folder = getParam("folder") || "düsseldorf";

    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const backBtn = document.getElementById("backBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pdfViewer = document.getElementById("pdfViewer");
    const errorBox = document.getElementById("errorBox");

    backBtn.href = `./?folder=${encodeURIComponent(folder)}`;

    if (!pdf || !name) {
      titleEl.textContent = "PDF yolu bulunamadı.";
      metaEl.textContent = "";
      pdfViewer.hidden = true;
      errorBox.hidden = false;
      setNavState(prevBtn, false);
      setNavState(nextBtn, false);
    } else {
      titleEl.textContent = formatTitle(name);
      metaEl.innerHTML = `Klasör: <code>${escapeHtml(getFolderPath(folder))}</code>`;
      pdfViewer.src = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdf)}`;

      loadFolderFiles(folder)
        .then((files) => {
          const currentIndex = files.findIndex((file) => file.name === name);

          if (currentIndex === -1) {
            metaEl.innerHTML = `Klasör: <code>${escapeHtml(getFolderPath(folder))}</code>`;
            setNavState(prevBtn, false);
            setNavState(nextBtn, false);
            return;
          }

          metaEl.innerHTML = `Klasör: <code>${escapeHtml(getFolderPath(folder))}</code> · ${currentIndex + 1} / ${files.length}`;

          const prevFile = currentIndex > 0 ? files[currentIndex - 1] : null;
          const nextFile = currentIndex < files.length - 1 ? files[currentIndex + 1] : null;

          setNavState(
            prevBtn,
            Boolean(prevFile),
            prevFile ? buildViewerUrl(folder, prevFile.name) : "#"
          );

          setNavState(
            nextBtn,
            Boolean(nextFile),
            nextFile ? buildViewerUrl(folder, nextFile.name) : "#"
          );
        })
        .catch(() => {
          setNavState(prevBtn, false);
          setNavState(nextBtn, false);
        });
    }
  </script>
</body>
</html>
