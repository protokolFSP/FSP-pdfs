<!-- /viewer.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.06);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    body{
      width:100vw;
      height:100vh;
    }

    #app{
      position:fixed;
      inset:0;
      padding:0;
      margin:0;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:var(--bg);
    }

    #frameWrap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:var(--panel);
    }

    #pdfFrame{
      display:block;
      width:100%;
      height:100%;
      border:0;
      background:#fff;
    }

    #overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(to bottom, rgba(243,244,246,.96), rgba(243,244,246,.92));
      z-index:10;
      transition:opacity .18s ease, visibility .18s ease;
    }

    #overlay.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .stateCard{
      width:min(720px, calc(100vw - 32px));
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px 18px 16px;
    }

    .stateTitle{
      margin:0 0 8px 0;
      font-size:1rem;
      font-weight:750;
      color:var(--text);
      word-break:break-word;
    }

    .stateText{
      margin:0;
      color:var(--muted);
      line-height:1.45;
      font-size:.95rem;
      word-break:break-word;
    }

    .stateActions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      text-decoration:none;
      font-size:.92rem;
      font-weight:650;
      cursor:pointer;
    }

    .btn:hover{
      background:#f9fafb;
    }

    .spinner{
      width:18px;
      height:18px;
      border:2px solid #d1d5db;
      border-top-color:#2563eb;
      border-radius:999px;
      display:inline-block;
      vertical-align:-3px;
      animation:spin .75s linear infinite;
      margin-right:8px;
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="frameWrap">
      <iframe id="pdfFrame" title="PDF görüntüleyici" referrerpolicy="no-referrer"></iframe>
    </div>

    <div id="overlay">
      <div class="stateCard">
        <h1 id="stateTitle" class="stateTitle">PDF yükleniyor…</h1>
        <p id="stateText" class="stateText">
          <span class="spinner" aria-hidden="true"></span>
          Görüntüleyici hazırlanıyor…
        </p>
        <div id="stateActions" class="stateActions" hidden>
          <a id="directOpenBtn" class="btn" href="#" target="_blank" rel="noopener">Doğrudan aç</a>
          <button id="reloadBtn" class="btn" type="button">Yenile</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PDFJS_WEB_VIEWER = "https://mozilla.github.io/pdf.js/web/viewer.html";

    const params = new URLSearchParams(location.search);
    const rawPdf = params.get("pdf") || "";
    const rawName = params.get("name") || "";

    const pdfFrame = document.getElementById("pdfFrame");
    const overlay = document.getElementById("overlay");
    const stateTitle = document.getElementById("stateTitle");
    const stateText = document.getElementById("stateText");
    const stateActions = document.getElementById("stateActions");
    const directOpenBtn = document.getElementById("directOpenBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    let currentPdfUrl = "";
    let loadTimeoutId = 0;

    function decodeSafe(value){
      try{
        return decodeURIComponent(value);
      }catch{
        return value;
      }
    }

    function fileNameFromUrl(url){
      try{
        const u = new URL(url, location.href);
        const raw = (u.pathname || "").split("/").pop() || "PDF";
        return decodeSafe(raw);
      }catch{
        return "PDF";
      }
    }

    function humanTitle(){
      const name = decodeSafe(rawName) || fileNameFromUrl(currentPdfUrl || rawPdf);
      return String(name || "PDF")
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim() || "PDF";
    }

    function buildAbsolutePdfUrl(input){
      try{
        return new URL(decodeSafe(input), location.href).toString();
      }catch{
        return decodeSafe(input);
      }
    }

    function buildFreshUrl(url){
      const u = new URL(url, location.href);
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function buildPdfJsViewerUrl(pdfUrl){
      return `${PDFJS_WEB_VIEWER}?file=${encodeURIComponent(pdfUrl)}`;
    }

    function showLoading(message){
      stateTitle.textContent = humanTitle() || "PDF yükleniyor…";
      stateText.innerHTML = `<span class="spinner" aria-hidden="true"></span>${message || "PDF yükleniyor…"}`;
      stateActions.hidden = true;
      overlay.classList.remove("hidden");
    }

    function showError(message){
      stateTitle.textContent = humanTitle() || "PDF açılamadı";
      stateText.textContent = message || "PDF yüklenemedi.";
      stateActions.hidden = false;
      overlay.classList.remove("hidden");
    }

    function hideOverlay(){
      overlay.classList.add("hidden");
    }

    async function verifyPdf(url){
      try{
        const r = await fetch(url, {
          method: "HEAD",
          cache: "no-store",
          mode: "cors"
        });
        if (r.ok) return true;
      }catch{}

      try{
        const r = await fetch(url, {
          method: "GET",
          cache: "no-store",
          mode: "cors",
          headers: { Range: "bytes=0-1" }
        });
        return r.ok;
      }catch{
        return false;
      }
    }

    function clearPendingTimeout(){
      if (loadTimeoutId){
        clearTimeout(loadTimeoutId);
        loadTimeoutId = 0;
      }
    }

    function startFrameLoad(viewerUrl){
      clearPendingTimeout();

      pdfFrame.onload = () => {
        clearPendingTimeout();
        hideOverlay();
      };

      pdfFrame.src = viewerUrl;

      loadTimeoutId = setTimeout(() => {
        showError("PDF görüntüleyici yanıt vermedi. Doğrudan aç ile deneyin.");
      }, 15000);
    }

    async function loadPdf(){
      currentPdfUrl = buildAbsolutePdfUrl(rawPdf);

      if (!currentPdfUrl){
        showError("PDF yolu bulunamadı.");
        pdfFrame.src = "about:blank";
        return;
      }

      document.title = humanTitle() || "PDF";
      directOpenBtn.href = buildFreshUrl(currentPdfUrl);

      showLoading("PDF kontrol ediliyor…");

      const freshPdfUrl = buildFreshUrl(currentPdfUrl);
      const ok = await verifyPdf(freshPdfUrl);

      if (!ok){
        showError("PDF dosyasına erişilemedi. Doğrudan aç ile deneyin.");
        pdfFrame.src = "about:blank";
        return;
      }

      showLoading("PDF.js görüntüleyici açılıyor…");
      startFrameLoad(buildPdfJsViewerUrl(freshPdfUrl));
    }

    reloadBtn.addEventListener("click", () => {
      loadPdf().catch((err) => {
        console.error(err);
        showError("PDF yeniden yüklenemedi.");
      });
    });

    window.addEventListener("message", async (event) => {
      const data = event && event.data;
      if (!data || typeof data !== "object") return;

      if (data.type === "fsp-pdf-copy-all-text"){
        try{
          const text = await extractPdfText(currentPdfUrl);
          event.source?.postMessage({
            type: "fsp-pdf-copy-all-text-result",
            ok: true,
            text
          }, "*");
        }catch(err){
          event.source?.postMessage({
            type: "fsp-pdf-copy-all-text-result",
            ok: false,
            error: err?.message || "text extraction failed"
          }, "*");
        }
      }
    });

    async function ensurePdfJsLib(){
      if (window.pdfjsLib) return window.pdfjsLib;

      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js";
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });

      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

      return window.pdfjsLib;
    }

    async function extractPdfText(pdfUrl){
      const pdfjsLib = await ensurePdfJsLib();
      const loadingTask = pdfjsLib.getDocument({
        url: buildFreshUrl(pdfUrl),
        withCredentials: false,
        useWorkerFetch: true,
        isEvalSupported: false,
        disableAutoFetch: false,
        disableStream: false,
        disableRange: false
      });

      const pdf = await loadingTask.promise;
      const parts = [];

      for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
        const page = await pdf.getPage(pageNo);
        const textContent = await page.getTextContent();
        const strings = (textContent.items || [])
          .map(item => item && typeof item.str === "string" ? item.str : "")
          .filter(Boolean);
        parts.push(strings.join(" "));
      }

      return parts.join("\n\n").trim();
    }

    loadPdf().catch((err) => {
      console.error(err);
      showError("PDF yüklenemedi.");
    });
  </script>
</body>
</html>
