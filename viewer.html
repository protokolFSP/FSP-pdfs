<!-- /viewer.html -->

<!doctype html>

<html lang="tr">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>PDF Görüntüleyici</title>

  <style>

    :root{

      --bg:#f3f4f6;

      --panel:#ffffff;

      --text:#111827;

      --muted:#6b7280;

      --line:#e5e7eb;

      --shadow:0 10px 30px rgba(0,0,0,.06);

      --hover:#f9fafb;

      --blue:#2563eb;

      --danger:#b91c1c;

    }

    *{ box-sizing:border-box; }

    html, body{

      margin:0;

      padding:0;

      width:100%;

      height:100%;

      background:var(--bg);

      color:var(--text);

      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

    }

    body{

      overflow:hidden;

    }

    #app{

      position:fixed;

      inset:0;

      display:flex;

      flex-direction:column;

      min-width:0;

      min-height:0;

    }

    #topbar{

      flex:0 0 auto;

      display:flex;

      align-items:center;

      justify-content:space-between;

      gap:12px;

      padding:12px 14px;

      background:var(--panel);

      border-bottom:1px solid var(--line);

      box-shadow:0 1px 0 rgba(0,0,0,.04);

      z-index:20;

    }

    #titleWrap{

      min-width:0;

      flex:1 1 auto;

      display:flex;

      flex-direction:column;

      gap:4px;

    }

    #title{

      margin:0;

      font-size:1rem;

      font-weight:750;

      line-height:1.35;

      word-break:break-word;

    }

    #meta{

      font-size:.9rem;

      color:var(--muted);

      line-height:1.35;

      word-break:break-all;

    }

    #actions{

      flex:0 0 auto;

      display:flex;

      align-items:center;

      gap:8px;

      flex-wrap:wrap;

      justify-content:flex-end;

    }

    .btn{

      display:inline-flex;

      align-items:center;

      justify-content:center;

      min-height:40px;

      padding:0 14px;

      border-radius:12px;

      border:1px solid var(--line);

      background:#fff;

      color:var(--text);

      text-decoration:none;

      font-size:.92rem;

      font-weight:650;

      cursor:pointer;

      user-select:none;

      white-space:nowrap;

    }

    .btn:hover{ background:var(--hover); }

    .btn:disabled{

      opacity:.45;

      cursor:default;

    }

    #statusBar{

      flex:0 0 auto;

      padding:8px 14px;

      background:#fff;

      border-bottom:1px solid var(--line);

      color:var(--muted);

      font-size:.92rem;

      line-height:1.35;

      white-space:nowrap;

      overflow:hidden;

      text-overflow:ellipsis;

    }

    #viewerWrap{

      flex:1 1 auto;

      min-height:0;

      overflow:auto;

      padding:16px;

      -webkit-overflow-scrolling:touch;

    }

    #viewer{

      display:flex;

      flex-direction:column;

      align-items:center;

      gap:16px;

      min-height:100%;

    }

    .pageCard{

      background:#fff;

      border:1px solid var(--line);

      border-radius:10px;

      box-shadow:var(--shadow);

      overflow:hidden;

      max-width:100%;

    }

    .pageCanvas{

      display:block;

      background:#fff;

      max-width:100%;

      height:auto;

    }

    .pageMeta{

      padding:8px 10px;

      border-top:1px solid #eee;

      background:#fff;

      color:var(--muted);

      font-size:.88rem;

      text-align:center;

    }

    .state{

      width:min(720px, 100%);

      background:#fff;

      border:1px solid var(--line);

      border-radius:16px;

      box-shadow:var(--shadow);

      padding:18px;

      color:var(--muted);

      line-height:1.5;

      font-size:.95rem;

    }

    .state.error{

      border-color:#fecaca;

      color:var(--danger);

    }

    .spinner{

      width:18px;

      height:18px;

      border:2px solid #d1d5db;

      border-top-color:var(--blue);

      border-radius:999px;

      display:inline-block;

      vertical-align:-3px;

      margin-right:8px;

      animation:spin .75s linear infinite;

    }

    @keyframes spin{

      from{ transform:rotate(0deg); }

      to{ transform:rotate(360deg); }

    }

    @media (max-width: 720px){

      #topbar{

        align-items:flex-start;

        flex-wrap:wrap;

      }

      #titleWrap{

        flex:1 1 100%;

      }

      #actions{

        width:100%;

        justify-content:flex-start;

      }

      #viewerWrap{

        padding:10px;

      }

    }

  </style>

</head>

<body>

  <div id="app">

    <div id="topbar">

      <div id="titleWrap">

        <h1 id="title">PDF yükleniyor…</h1>

        <div id="meta">Hazırlanıyor…</div>

      </div>

      <div id="actions">

        <button id="reloadBtn" class="btn" type="button">Yenile</button>

        <a id="downloadBtn" class="btn" href="#" download>İndir</a>

        <a id="openBtn" class="btn" href="#" target="_blank" rel="noopener">Yeni sekmede aç</a>

      </div>

    </div>

    <div id="statusBar">Hazırlanıyor…</div>

    <div id="viewerWrap">

      <div id="viewer">

        <div id="state" class="state">

          <span class="spinner" aria-hidden="true"></span>

          PDF yükleniyor…

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

  <script>

    pdfjsLib.GlobalWorkerOptions.workerSrc =

      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

    const params = new URLSearchParams(location.search);

    const rawPdf = params.get("pdf") || "";

    const rawName = params.get("name") || "";

    const titleEl = document.getElementById("title");

    const metaEl = document.getElementById("meta");

    const statusBarEl = document.getElementById("statusBar");

    const viewerEl = document.getElementById("viewer");

    const stateEl = document.getElementById("state");

    const reloadBtn = document.getElementById("reloadBtn");

    const downloadBtn = document.getElementById("downloadBtn");

    const openBtn = document.getElementById("openBtn");

    let currentBlobUrl = "";

    let currentPdfBytes = null;

    let currentPdfUrl = "";

    let currentPdfName = "";

    let currentRenderToken = 0;

    function decodeSafe(value){

      try{

        return decodeURIComponent(value);

      }catch{

        return value;

      }

    }

    function buildAbsoluteUrl(input){

      try{

        return new URL(decodeSafe(input), location.href).toString();

      }catch{

        return decodeSafe(input);

      }

    }

    function fileNameFromUrl(url){

      try{

        const u = new URL(url, location.href);

        const raw = (u.pathname || "").split("/").pop() || "document.pdf";

        return decodeSafe(raw);

      }catch{

        return "document.pdf";

      }

    }

    function normalizePdfName(name){

      const raw = String(name || "").trim();

      if (!raw) return "document.pdf";

      return /\.pdf$/i.test(raw) ? raw : `${raw}.pdf`;

    }

    function formatTitle(name){

      return normalizePdfName(name)

        .replace(/\.pdf$/i, "")

        .replace(/\s+/g, " ")

        .trim() || "PDF";

    }

    function buildFreshUrl(url){

      const u = new URL(url, location.href);

      u.searchParams.set("_ts", String(Date.now()));

      return u.toString();

    }

    function setStatus(text){

      statusBarEl.textContent = text || "";

    }

    function setStateLoading(text){

      stateEl.className = "state";

      stateEl.innerHTML = `<span class="spinner" aria-hidden="true"></span>${escapeHtml(text || "PDF yükleniyor…")}`;

      stateEl.hidden = false;

    }

    function setStateError(text){

      stateEl.className = "state error";

      stateEl.textContent = text || "PDF yüklenemedi.";

      stateEl.hidden = false;

    }

    function hideState(){

      stateEl.hidden = true;

    }

    function escapeHtml(value){

      return String(value)

        .replaceAll("&", "&amp;")

        .replaceAll("<", "&lt;")

        .replaceAll(">", "&gt;")

        .replaceAll('"', "&quot;")

        .replaceAll("'", "&#39;");

    }

    function clearViewer(){

      viewerEl.innerHTML = "";

      viewerEl.appendChild(stateEl);

    }

    function revokeBlobUrl(){

      if (!currentBlobUrl) return;

      try{

        URL.revokeObjectURL(currentBlobUrl);

      }catch{}

      currentBlobUrl = "";

    }

    function setActionLinks(blobUrl, pdfUrl, pdfName){

      downloadBtn.href = blobUrl || pdfUrl || "#";

      downloadBtn.download = normalizePdfName(pdfName);

      openBtn.href = blobUrl || pdfUrl || "#";

    }

    async function fetchPdfBytes(url){

      const response = await fetch(buildFreshUrl(url), {

        method: "GET",

        cache: "no-store",

        mode: "cors"

      });

      if (!response.ok){

        throw new Error(`PDF indirilemedi: ${response.status}`);

      }

      return new Uint8Array(await response.arrayBuffer());

    }

    function createPageCard(pageNo, totalPages, canvas){

      const card = document.createElement("div");

      card.className = "pageCard";

      const meta = document.createElement("div");

      meta.className = "pageMeta";

      meta.textContent = `Sayfa ${pageNo} / ${totalPages}`;

      canvas.className = "pageCanvas";

      card.appendChild(canvas);

      card.appendChild(meta);

      return card;

    }

    async function renderPdfFromBytes(pdfBytes, renderToken){

      const loadingTask = pdfjsLib.getDocument({

        data: pdfBytes,

        useWorkerFetch: false,

        isEvalSupported: false,

        disableAutoFetch: false,

        disableStream: false,

        disableRange: false

      });

      const pdf = await loadingTask.promise;

      if (renderToken !== currentRenderToken){

        try{ await loadingTask.destroy(); }catch{}

        return;

      }

      clearViewer();

      hideState();

      setStatus(`Toplam ${pdf.numPages} sayfa`);

      for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){

        if (renderToken !== currentRenderToken) return;

        setStatus(`Sayfa ${pageNo} / ${pdf.numPages} hazırlanıyor…`);

        const page = await pdf.getPage(pageNo);

        const baseViewport = page.getViewport({ scale: 1 });

        const availableWidth = Math.max(320, viewerEl.clientWidth || window.innerWidth - 40);

        const targetWidth = Math.min(baseViewport.width, availableWidth);

        const scale = targetWidth / baseViewport.width;

        const viewport = page.getViewport({ scale });

        const outputScale = window.devicePixelRatio || 1;

        const canvas = document.createElement("canvas");

        const ctx = canvas.getContext("2d", { alpha: false });

        canvas.width = Math.floor(viewport.width * outputScale);

        canvas.height = Math.floor(viewport.height * outputScale);

        canvas.style.width = `${Math.floor(viewport.width)}px`;

        canvas.style.height = `${Math.floor(viewport.height)}px`;

        const transform = outputScale !== 1

          ? [outputScale, 0, 0, outputScale, 0, 0]

          : null;

        await page.render({

          canvasContext: ctx,

          viewport,

          transform

        }).promise;

        viewerEl.appendChild(createPageCard(pageNo, pdf.numPages, canvas));

      }

      setStatus(`Yüklendi · ${pdf.numPages} sayfa`);

      metaEl.textContent = `${normalizePdfName(currentPdfName)} · ${pdf.numPages} sayfa`;

    }

    async function loadAndRender(){

      const pdfUrl = buildAbsoluteUrl(rawPdf);

      const pdfName = normalizePdfName(decodeSafe(rawName) || fileNameFromUrl(pdfUrl));

      currentPdfUrl = pdfUrl;

      currentPdfName = pdfName;

      currentRenderToken += 1;

      const renderToken = currentRenderToken;

      titleEl.textContent = formatTitle(pdfName);

      metaEl.textContent = "PDF indiriliyor…";

      setStatus("PDF indiriliyor…");

      setStateLoading("PDF yükleniyor…");

      clearViewer();

      revokeBlobUrl();

      currentPdfBytes = null;

      setActionLinks("", pdfUrl, pdfName);

      if (!pdfUrl){

        setStateError("PDF yolu bulunamadı.");

        setStatus("Hata");

        return;

      }

      try{

        const pdfBytes = await fetchPdfBytes(pdfUrl);

        if (renderToken !== currentRenderToken) return;

        currentPdfBytes = pdfBytes;

        currentBlobUrl = URL.createObjectURL(new Blob([pdfBytes], { type: "application/pdf" }));

        setActionLinks(currentBlobUrl, pdfUrl, pdfName);

        await renderPdfFromBytes(pdfBytes, renderToken);

      }catch(err){

        console.error(err);

        setStateError(`PDF yüklenemedi: ${err?.message || "bilinmeyen hata"}`);

        setStatus("Hata");

        metaEl.textContent = normalizePdfName(pdfName);

      }

    }

    reloadBtn.addEventListener("click", () => {

      loadAndRender().catch((err) => {

        console.error(err);

        setStateError("PDF yeniden yüklenemedi.");

        setStatus("Hata");

      });

    });

    window.addEventListener("resize", () => {

      clearTimeout(window.__pdfResizeTimer);

      window.__pdfResizeTimer = setTimeout(() => {

        if (!currentPdfBytes) return;

        currentRenderToken += 1;

        renderPdfFromBytes(currentPdfBytes, currentRenderToken).catch((err) => {

          console.error(err);

          setStateError("PDF yeniden çizilemedi.");

          setStatus("Hata");

        });

      }, 180);

    });

    window.addEventListener("pagehide", revokeBlobUrl);

    window.addEventListener("beforeunload", revokeBlobUrl);

    loadAndRender().catch((err) => {

      console.error(err);

      setStateError("PDF yüklenemedi.");

      setStatus("Hata");

    });

  </script>

</body>

</html>
